---
# Refresh-token rotation + replay-detection.
#
# OAuth 2.1 + Hydra default behaviour: every successful /oauth2/token
# refresh issues a *new* refresh_token and invalidates the previous one.
# Replaying the old refresh_token must yield invalid_grant — without this
# detection, a stolen refresh token would be a permanent backdoor.

apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: refresh-token
spec:
  description: |
    Get an initial token set via Authorization Code + PKCE, then:
      1. refresh once   → new refresh_token issued (rotation)
      2. reuse old one  → server must answer invalid_grant

  steps:
    - name: oidcclient-ready
      try:
        - assert:
            resource:
              apiVersion: kubauth.kubotal.io/v1alpha1
              kind: OidcClient
              metadata: {name: smoke-client, namespace: kubauth-system}
              status: {phase: READY}

    - name: rotation-and-replay
      try:
        - script:
            content: |
              set -eu
              kubectl run refresh-curl \
                --namespace=$NAMESPACE \
                --image=alpine:3.20 \
                --restart=Never \
                --rm -i \
                --quiet \
                --command -- sh -c '
                  set -eu
                  apk add -q --no-cache curl jq >/dev/null
                  ISS="https://kubauth-oidc-server.kubauth-system.svc:443"
                  CID="smoke-client"
                  SECRET="smoke-client-secret-please-change"
                  REDIR="http://localhost:9999/callback"
                  STATE="abcdef1234567890"
                  VERIFIER="dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk"
                  CHALLENGE="E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM"
                  # offline_access scope is required by Hydra to issue a refresh_token
                  QS="response_type=code&client_id=${CID}&redirect_uri=${REDIR}&scope=openid+offline_access&state=${STATE}&code_challenge=${CHALLENGE}&code_challenge_method=S256"

                  # Step 1: initial Authorization Code + PKCE flow → tokens with RT1
                  curl -sk -L -c /tmp/cj -b /tmp/cj -o /dev/null "${ISS}/oauth2/auth?${QS}"
                  REDIRECT=$(curl -sk -c /tmp/cj -b /tmp/cj \
                    -X POST "${ISS}/oauth2/login?${QS}" \
                    --data-urlencode "login=alice" \
                    --data-urlencode "password=alice-password" \
                    -o /dev/null -w "%{redirect_url}")
                  CODE=$(echo "$REDIRECT" | sed -n "s/.*[?&]code=\\([^&]*\\).*/\\1/p")
                  [ -n "$CODE" ] || { echo "no code from /oauth2/login: $REDIRECT"; exit 1; }

                  INITIAL=$(curl -sk -X POST "${ISS}/oauth2/token" \
                    -u "${CID}:${SECRET}" \
                    --data-urlencode "grant_type=authorization_code" \
                    --data-urlencode "code=${CODE}" \
                    --data-urlencode "redirect_uri=${REDIR}" \
                    --data-urlencode "code_verifier=${VERIFIER}")
                  echo "initial: ${INITIAL}"
                  RT1=$(echo "$INITIAL" | sed -n "s/.*\"refresh_token\":\"\\([^\"]*\\)\".*/\\1/p")
                  AT1=$(echo "$INITIAL" | sed -n "s/.*\"access_token\":\"\\([^\"]*\\)\".*/\\1/p")
                  [ -n "$RT1" ] || { echo "no refresh_token in initial response"; exit 1; }
                  [ -n "$AT1" ] || { echo "no access_token in initial response"; exit 1; }

                  # Step 2: refresh — issues a new RT (rotation)
                  REFRESHED=$(curl -sk -X POST "${ISS}/oauth2/token" \
                    -u "${CID}:${SECRET}" \
                    --data-urlencode "grant_type=refresh_token" \
                    --data-urlencode "refresh_token=${RT1}")
                  echo "refreshed: ${REFRESHED}"
                  RT2=$(echo "$REFRESHED" | sed -n "s/.*\"refresh_token\":\"\\([^\"]*\\)\".*/\\1/p")
                  AT2=$(echo "$REFRESHED" | sed -n "s/.*\"access_token\":\"\\([^\"]*\\)\".*/\\1/p")
                  echo "$REFRESHED" | jq -e .id_token >/dev/null || { echo "refresh did not return id_token"; exit 1; }
                  [ -n "$RT2" ]      || { echo "refresh did not issue a new refresh_token"; exit 1; }
                  [ "$RT1" != "$RT2" ] || { echo "refresh_token NOT rotated (RT1 == RT2) — replay detection broken"; exit 1; }
                  [ "$AT1" != "$AT2" ] || { echo "access_token did not change after refresh"; exit 1; }
                  echo "✓ rotation: RT1 != RT2"

                  # Step 3: replay RT1 — must be rejected with invalid_grant
                  REPLAY=$(curl -sk -X POST "${ISS}/oauth2/token" \
                    -u "${CID}:${SECRET}" \
                    --data-urlencode "grant_type=refresh_token" \
                    --data-urlencode "refresh_token=${RT1}")
                  echo "replay: ${REPLAY}"
                  echo "$REPLAY" | jq -e ".error == \"invalid_grant\"" >/dev/null \
                    || { echo "old refresh_token was NOT rejected — replay detection broken"; exit 1; }
                  case "$REPLAY" in
                    *already*used*|*already+used*|*already%20used*) : ;;
                    *) echo "warning: invalid_grant returned but description does not mention reuse: ${REPLAY}" ;;
                  esac
                  echo "✓ replay rejected"
                '

    - name: cleanup-refresh-pod
      try:
        - script:
            content: |
              kubectl -n $NAMESPACE delete pod refresh-curl --ignore-not-found --wait=false
