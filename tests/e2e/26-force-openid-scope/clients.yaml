---
apiVersion: v1
kind: Secret
metadata:
  name: force-yes-secret
  namespace: kubauth-system
type: Opaque
stringData:
  client_secret: "force-yes-secret-please-change"
---
apiVersion: kubauth.kubotal.io/v1alpha1
kind: OidcClient
metadata:
  name: force-openid-yes
  namespace: kubauth-system
spec:
  description: "Test client with forceOpenIdScope=true"
  displayName: Force-yes
  public: false
  secrets:
    - name: force-yes-secret
      key: client_secret
      hashed: false
  redirectURIs: ["http://localhost:9999/cb"]
  grantTypes: [authorization_code, password]
  responseTypes: [code]
  scopes: [openid, profile, email]
  audiences: [kubauth-tests]
  forceOpenIdScope: true
---
apiVersion: v1
kind: Secret
metadata:
  name: force-no-secret
  namespace: kubauth-system
type: Opaque
stringData:
  client_secret: "force-no-secret-please-change"
---
apiVersion: kubauth.kubotal.io/v1alpha1
kind: OidcClient
metadata:
  name: force-openid-no
  namespace: kubauth-system
spec:
  description: "Test client with forceOpenIdScope=false"
  displayName: Force-no
  public: false
  secrets:
    - name: force-no-secret
      key: client_secret
      hashed: false
  redirectURIs: ["http://localhost:9999/cb"]
  grantTypes: [authorization_code, password]
  responseTypes: [code]
  scopes: [openid, profile, email]
  audiences: [kubauth-tests]
  forceOpenIdScope: false
