---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: conformance
  labels:
    app: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:6.0.13
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
              name: mongo
          # No persistence — every fresh cluster starts with empty
          # state. The suite stores test plan history; for CI we do
          # not care about retaining it across test runs.
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            tcpSocket: {port: 27017}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: {cpu: 50m, memory: 256Mi}
            limits: {cpu: "1", memory: 1Gi}
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: conformance
spec:
  selector:
    app: mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
