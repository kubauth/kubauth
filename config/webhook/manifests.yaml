  name: mgroup-v1alpha1.kb.io
  rules:
  - apiGroups:
    - kubauth.kubotal.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - groups
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-kubauth-kubotal-io-v1alpha1-groupbinding
  failurePolicy: Fail
  name: mgroupbinding-v1alpha1.kb.io
  rules:
  - apiGroups:
    - kubauth.kubotal.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - groupbindings
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-kubauth-kubotal-io-v1alpha1-user
  failurePolicy: Fail
  name: muser-v1alpha1.kb.io
  rules:
  - apiGroups:
    - kubauth.kubotal.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - users
  sideEffects: None
