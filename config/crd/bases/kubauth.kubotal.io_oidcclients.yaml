                type: boolean
              grantTypes:
                description: The client's allowed grant types.
                items:
                  type: string
                type: array
              idTokenLifespan:
                type: string
              postLogoutURL:
                description: |-
                  Where to redirected user on logout.
                  Will take precedence on the same global configuration value.
                  May be overridden by a query parameter on the logout url
                type: string
