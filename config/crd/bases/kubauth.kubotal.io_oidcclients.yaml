  names:
    kind: OidcClient
    listKind: OidcClientList
    plural: oidcclients
    singular: oidcclient
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.clientId
      name: client_id
      type: string
    - jsonPath: .status.phase
      name: Status
      type: string
    - jsonPath: .status.message
      name: Message
      type: string
    - jsonPath: .spec.public
      name: Pub.
      type: boolean
    - jsonPath: .spec.description
      name: Description
      type: string
    - jsonPath: .spec.displayName
      name: Display
      type: string
    - jsonPath: .spec.entryURL
      name: Link
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of OidcClient
            properties:
              accessTokenLifespan:
                type: string
              audiences:
                items:
                  type: string
                type: array
              clientId:
                description: |-
                  The client_id for the OIDC protocol.
                  Default to:
                  - The resource name if the resource is defined in the clientPrivilegedNamespace
                  - <namespace>-<resourceName> in other cases
                  These default values ensure uniqueness of the client_id. If you override it by setting this value, you are responsible to maintains this uniqueness.
                  So, the recommended pattern is to NOT set this values.
                  NB: The effective clientId, used by the OIDC protocol is set in the Status part.
                type: string
              description:
                description: A human oriented description
                type: string
              displayName:
                description: Application name. May be used to be displayed in an application
                  list
                type: string
              enabled:
                description: 'Default: true'
                type: boolean
              entryURL:
                description: The application entry URL. May be used to build a user-friendly
                  list
                type: string
              forceOpenIdScope:
