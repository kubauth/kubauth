{{ if .Values.oidc.enabled }}
{{ if .Values.oidc.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kubauth.oidc.ingressName" . }}
  labels:
    {{- include "kubauth.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.oidc.ingress.passthrough }}
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    haproxy.org/ssl-passthrough: "true"
    ingress.kubernetes.io/ssl-passthrough: "true"
    {{- end }}
    {{- with .Values.oidc.ingress.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.commonAnnotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.oidc.ingress.class }}
  rules:
    - host: {{ required "oidc.ingress.host must be defined!" .Values.oidc.ingress.host }}
      http:
        paths:
          - backend:
              service:
                name: {{ include "kubauth.oidc.server.serviceName" . }}
                port:
                  number: 443
            path: /
            pathType: Prefix
{{ end }}
{{ end }}
