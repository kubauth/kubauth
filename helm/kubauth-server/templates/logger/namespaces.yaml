{{- if .Values.logger.enabled }}
{{- if .Values.logger.createNamespace }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.logger.namespace }}
  labels:
    {{- include "kubauth.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec: {}
{{- end }}
{{- end }}


