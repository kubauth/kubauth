{{- if .Values.ucrd.enabled }}
{{- if .Values.networkPolicies.enabled }}

{{- if and .Values.ucrd.webhooks.enabled .Values.networkPolicies.forWebhooks }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubauth.ucrd.webhooks.networkPolicyName" .}}
  namespace:  {{ .Release.Namespace }}
spec:
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              component: kube-apiserver
        {{- with .Values.networkPolicies.ipBlock }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - port: {{ .Values.ucrd.webhooks.port }}
          protocol: TCP
  podSelector:
    matchLabels:
      {{- include "kubauth.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress

{{- end }}

{{- end }}
{{- end }}
