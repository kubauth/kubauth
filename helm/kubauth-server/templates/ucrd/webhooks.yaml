{{- if .Values.ucrd.enabled }}

{{- if .Values.ucrd.webhooks.enabled }}

---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "kubauth.ucrd.webhooks.mutatingWebhookConfiguration" .}}
  labels:
    {{- include "kubauth.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "kubauth.ucrd.webhooks.secretName" . }}
  {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kubauth.ucrd.webhooks.serviceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-kubauth-kubotal-io-v1alpha1-group
    failurePolicy: Fail
    name: mgroup-v1alpha1.kb.io
    rules:
      - apiGroups:
          - kubauth.kubotal.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - groups
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kubauth.ucrd.webhooks.serviceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-kubauth-kubotal-io-v1alpha1-groupbinding
    failurePolicy: Fail
    name: mgroupbinding-v1alpha1.kb.io
    rules:
      - apiGroups:
          - kubauth.kubotal.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - groupbindings
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kubauth.ucrd.webhooks.serviceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-kubauth-kubotal-io-v1alpha1-user
    failurePolicy: Fail
    name: muser-v1alpha1.kb.io
    rules:
      - apiGroups:
          - kubauth.kubotal.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - users
    sideEffects: None


    
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
