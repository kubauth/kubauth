  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "kubauth.ucrd.webhooks.secretName" . }}
  {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}  
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name:  {{ include "kubauth.ucrd.webhooks.serviceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-kubauth-kubotal-io-v1alpha1-group
    failurePolicy: Fail
    name: vgroup-v1alpha1.kb.io
    rules:
      - apiGroups:
          - kubauth.kubotal.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - groups
