    clientConfig:
      service:
        name:  {{ include "kubauth.ucrd.webhooks.serviceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-kubauth-kubotal-io-v1alpha1-groupbinding
    failurePolicy: Fail
    name: vgroupbinding-v1alpha1.kb.io
    rules:
      - apiGroups:
          - kubauth.kubotal.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - groupbindings
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name:  {{ include "kubauth.ucrd.webhooks.serviceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-kubauth-kubotal-io-v1alpha1-user
    failurePolicy: Fail
    name: vuser-v1alpha1.kb.io
    rules:
      - apiGroups:
          - kubauth.kubotal.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - users
    sideEffects: None

{{- end }}
{{- end }}

