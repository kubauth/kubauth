{{ if .Values.oidc.enabled }}
{{ if .Values.oidc.ingress.enabled }}
{{ if  eq .Values.oidc.ingress.class "nginx" }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kubauth.oidc.ingressName" . }}
  labels:
    {{- include "kubauth.labels" . | nindent 4 }}
  annotations:
  {{ if .Values.oidc.server.tls }}
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
  {{ end }}
  {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ required "ingress.host must be defined!" .Values.oidc.ingress.host }}
      http:
        paths:
          - backend:
              service:
                name: {{ include "kubauth.oidc.server.serviceName" . }}
                port:
                  number: 443
            path: /
            pathType: Prefix
{{ else }}
  {{- fail "Unmanaged ingress class" }}
{{ end }}
{{ end }}
{{ end }}
