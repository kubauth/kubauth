                format: date-time
                type: string
              fullName:
                description: The user full name
                type: string
              login:
                type: string
              webToken:
                description: |-
                  The original token (cookie value) of the web session.
                  Stored as the SsoSession name is a sanitized non-reversible version of this
                type: string
