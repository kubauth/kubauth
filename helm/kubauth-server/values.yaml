
#ports:
#  oidc: 6801
#  ucrd: 6802
#  ldap: 6803
#  merger: 6804
#  logger: 6805


replicaCount: 1

# Following will allow a renaming of all kubauth kubernetes resources
# Allow overriding base name of all resources
baseNameOverride:

# Image may be different for containers
image:
  pullSecrets: []


# -- Annotations to be added to the pod
podAnnotations: {}

# -- Annotations to be added to all other resources
commonAnnotations: {}


# Security Context for each containers
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - "ALL"

# -- Security Context for the whole pod
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault


# NodeSelector for the pod to be installed
nodeSelector: {}

# -- Tolerations for the pod to be installed
tolerations: []

# -- Affinity for the pod to be installed
affinity: {}


# Will default to "kubauth.baseName"
deploymentName:

# Will default to "kubauth.baseName"
serviceAccountName:

# Will default to "kubauth.baseName"
roleName:

networkPolicies:
  # If false, no network policy will be defined at all. For system which does not support them.
  enabled: true
  # NOTE: There will be network policies in some submodule, to allow ingress => service

  # Following are for special cases. Should be false in usual deployment
  # Allow all pods communication in deployment namespace. Also allow pod to resolve name using core dns
  # Set if kubauth modules are spread on several pods
  allowIntraNamespace: false
  # Allow outgoing connection from deployment namespaces
  allowAllEgress: false

  # Default to {{ include "kubauth.baseName" .}}-allow-intra-namespace
  allowIntraNamespacePolicyName:
  # Default to {{ include "kubauth.baseName" .}}-allow-all-egress
  allowAllEgressPolicyName:

oidc:
  enabled: true

  issuer: # TBD
  postLogoutURL: # TBD
  # https://www.scottbrady.io/oauth/why-the-resource-owner-password-credentials-grant-type-is-not-authentication-nor-suitable-for-modern-applications
  allowPasswordGrant: false   # Allow Resource Owner Password Credentials (ROPC) grant type, aka the password grant.
  enforcePKCE: false  # If set, all authorization code grand must use PKCE

  idp:
    baseURL: http://localhost:6805
    rootCAPath: # TBD if https.
    insecureSkipVerify: false

  # Allow to change some logger configuration
  logger:
    mode: json  # "Log mode (dev or json)
    level: info # Log level(DEBUG, INFO, WARN, ERROR)
  # Dump all http server req/resp: 0:No  1:Short info message, 2:full info message, 3:Full json sump
  dumpExchanges: 0
  # Display all command line flags on boot
  displayFlags: true

  # Where to store OidcClient resources.
  clients:
    createNamespace: true
    namespace: kubauth-oidc
    # Default to {{ include "kubauth.baseName" .}}-oidc-client
    roleName:

  server:
    tls: true
    bindAddr: "0.0.0.0"
    bindPort: 6801    # See internal/global/default.go
    certificateIssuer: # TBD
    issuerKind: ClusterIssuer

    resourcesFolder: resources

    # Default to {{ include "kubauth.baseName" .}}-oidc-server
    certificateName:
    # Default to {{ include "kubauth.baseName" .}}-oidc-server-cert
    certificateSecretName:
    # Default to {{ include "kubauth.baseName" .}}-oidc-server
    serviceName:

  ingress:
    enabled: true
    class: nginx  # Only nginx currently supported
    host: # TBD

  sso:
    createNamespace: true
    namespace: kubauth-sso
    sticky: true
    lifeTime: "8h"
    cleanupPeriod: "5m"
    # Default to {{ include "kubauth.baseName" .}}-oidc-sso
    roleName:

  image:
    repository: quay.io/kubauth/exec/kubauth-server
    # -- Overrides the image tag whose default is the chart appVersion.
    tag:
    pullPolicy: IfNotPresent

  # The address the probe endpoint binds to.
  healthProbeBindPort: 8110
  disableProbes: false

  resources:
    limits:
      cpu: 500m
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 512Mi

  extraEnv:
  additionalArgs: []
  extraVolumes: []
  #   - name:
  #     mountPath:
  #     claimName:
  extraSecrets: []
  #  - name:
  #    mountPath:
  #    secretName:

  # Container specific securityContext
  securityContext:

  metrics:
    enabled: false
    bindPort: 8443
    secured: false  # Set both TLS and client auth (see https://book.kubebuilder.io/reference/metrics)
    # This will be used to validate communication with the metrics endpoint
    # By default, will use a self signed certificate issuer. But, you can provide your own ClusterIssuer
    certificateClusterIssuer:
    serviceMonitor:
      enabled: false
      name:  # -- Will default to {{ include "kubauth.baseName" . }}-oidc

    # -- Will default to {{ include "kubauth.baseName" . }}-oidc-metrics
    serviceName:
    # -- Will default to {{ include "kubauth.baseName" . }}-oidc-metrics
    certificateName:
    # -- Will default to {{ include "kubauth.baseName" . }}-oidc-metrics
    secretName:
    # -- Will default to {{ include "kubauth.baseName" . }}-oidc-metrics
    certificateSelfSignedIssuerName:

  webhooks:
    enabled: true
    port: 9443

    # This will be used to validate communication between the API server and this webhook server
    # By default, will use a self signed certificate issuer. But, you can provide your own ClusterIssuer
    certificateClusterIssuer:

    # Following will allow a renaming of kubauth webhook related kubernetes resources
    # Leave it empty to use default values will works in most cases
    # -- Will default to {{ include "kubauth.baseName" . }}-oidc-webhook
    serviceName:
    # -- Will default to {{ include "kubauth.baseName" . }}-oidc-webhook
    certificateName:
    # -- Will default to {{ include "kubauth.baseName" . }}-oidc-webhook
    secretName:
    # -- Will default to {{ include "kubauth.webhook.baseName" . }}-oidc-webhook
    certificateSelfSignedIssuerName:
    # -- Will default to {{ include "kubauth.webhook.baseName" . }}-oidc-validating-webhook-configuration
    validatingWebhookConfiguration:
    # -- Will default to {{ include "kubauth.webhook.baseName" . }}-oidc-mutating-webhook-configuration
    mutatingWebhookConfiguration:

  # Default to {{ include "kubauth.baseName" .}}-oidc
  ingressName:
  # Default to {{ include "kubauth.baseName" .}}-oidc-ingress
  ingressNetworkPolicyName:
  # Default to {{ include "kubauth.baseName" .}}-oidc-jwt-key
  jwtSigningKeySecretName:
  # Default to {{ include "kubauth.baseName" .}}-oidc-jwt-secret
  jwtSecretRoleName:

logger:
  enabled: true

  namespace: kubauth-audit
  createNamespace: true

  idp:
    baseURL: http://localhost:6802
    rootCAPath: # TBD if https.
    insecureSkipVerify: false

  cleaner:
    loginLifetime: "8h"
    cleanupPeriod: "5m"

  # Allow to change some logger configuration
  logger:
    mode: json  # "Log mode (dev or json)
    level: info # Log level(DEBUG, INFO, WARN, ERROR)
  # Dump all http server req/resp: 0:No  1:Short info message, 2:full info message, 3:Full json sump
  dumpExchanges: 0
  # Display all command line flags on boot
  displayFlags: true

  image:
    repository: quay.io/kubauth/exec/kubauth-server
    # -- Overrides the image tag whose default is the chart appVersion.
    tag:
    pullPolicy: IfNotPresent

  server:
    tls: false
    bindAddr: "127.0.0.1"
    bindPort:  6805
    certificateIssuer: # TBD
    issuerKind: ClusterIssuer
    bfaProtection: false

    # Default to {{ include "kubauth.baseName" .}}-logger-server
    certificateName:
    # Default to {{ include "kubauth.baseName" .}}-logger-server-cert
    certificateSecretName:


  resources:
    limits:
      cpu: 500m
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 512Mi

  extraEnv:
  additionalArgs: []
  extraVolumes: []
  #   - name:
  #     mountPath:
  #     claimName:
  extraSecrets: []
  #  - name:
  #    mountPath:
  #    secretName:

  # Container specific securityContext
  securityContext:

merger:
  enabled: false

  # Allow to change some logger configuration
  logger:
    mode: json  # "Log mode (dev or json)
    level: info # Log level(DEBUG, INFO, WARN, ERROR)
  # Dump all http server req/resp: 0:No  1:Short info message, 2:full info message, 3:Full json sump
  dumpExchanges: 0
  # Display all command line flags on boot
  displayFlags: true

  image:
    repository: quay.io/kubauth/exec/kubauth-server
    # -- Overrides the image tag whose default is the chart appVersion.
    tag:
    pullPolicy: IfNotPresent

  providers:
    - name: ucrd
      httpConfig:
        baseUrl: http://localhost:6802
      credentialAuthority: true
      groupAuthority: true
      groupPattern: "%s"
      claimAuthority: true
      claimPattern: "%s"
      nameAuthority: true
      emailAuthority: true
      critical: true
      uidOffset: 0

  server:
    tls: false
    bindAddr: "127.0.0.1"
    bindPort:  6804
    certificateIssuer: # TBD
    issuerKind: ClusterIssuer
    bfaProtection: false

    # Default to {{ include "kubauth.baseName" .}}-logger-server
    certificateName:
    # Default to {{ include "kubauth.baseName" .}}-logger-server-cert
    certificateSecretName:

  resources:
    limits:
      cpu: 500m
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 512Mi

  extraEnv:
  additionalArgs: []
  extraVolumes: []
  #   - name:
  #     mountPath:
  #     claimName:
  extraSecrets: []
  #  - name:
  #    mountPath:
  #    secretName:

  # Container specific securityContext
  securityContext:

  configMapName:

ucrd:
  enabled: true

  namespace: kubauth-users
  createNamespace: true

  # Allow to change some logger configuration
  logger:
    mode: json  # "Log mode (dev or json)
    level: info # Log level(DEBUG, INFO, WARN, ERROR)
  # Dump all http server req/resp: 0:No  1:Short info message, 2:full info message, 3:Full json sump
  dumpExchanges: 0
  # Display all command line flags on boot
  displayFlags: true

  image:
    repository: quay.io/kubauth/exec/kubauth-server
    # -- Overrides the image tag whose default is the chart appVersion.
    tag:
    pullPolicy: IfNotPresent

  server:
    tls: false
    bindAddr: "127.0.0.1"
    bindPort:  6802
    certificateIssuer: # TBD
    issuerKind: ClusterIssuer
    bfaProtection: false

    # Default to {{ include "kubauth.baseName" .}}-ucrd-server
    certificateName:
    # Default to {{ include "kubauth.baseName" .}}-ucrd-server-cert
    certificateSecretName:

  # The address the probe endpoint binds to.
  healthProbeBindPort: 8111
  disableProbes: false

  resources:
    limits:
      cpu: 500m
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 512Mi

  extraEnv:
  additionalArgs: []
  extraVolumes: []
  #   - name:
  #     mountPath:
  #     claimName:
  extraSecrets: []
  #  - name:
  #    mountPath:
  #    secretName:


  # Container specific securityContext
  securityContext:

  metrics:
    enabled: false
    bindPort: 8444
    secured: false  # Set both TLS and client auth (see https://book.kubebuilder.io/reference/metrics)
    # This will be used to validate communication with the metrics endpoint
    # By default, will use a self signed certificate issuer. But, you can provide your own ClusterIssuer
    certificateClusterIssuer:
    serviceMonitor:
      enabled: false
      name:  # -- Will default to {{ include "kubauth.baseName" . }}-ucrd

    # -- Will default to {{ include "kubauth.baseName" . }}-ucrd-metrics
    serviceName:
    # -- Will default to {{ include "kubauth.baseName" . }}-ucrd-metrics
    certificateName:
    # -- Will default to {{ include "kubauth.baseName" . }}-ucrd-metrics
    secretName:
    # -- Will default to {{ include "kubauth.baseName" . }}-ucrd-metrics
    certificateSelfSignedIssuerName:

  webhooks:
    enabled: true
    port: 9444

    # This will be used to validate communication between the API server and this webhook server
    # By default, will use a self signed certificate issuer. But, you can provide your own ClusterIssuer
    certificateClusterIssuer:

    # Following will allow a renaming of kubauth webhook related kubernetes resources
    # Leave it empty to use default values will works in most cases
    # -- Will default to {{ include "kubauth.baseName" . }}-ucrd-webhook
    serviceName:
    # -- Will default to {{ include "kubauth.baseName" . }}-ucrd-webhook
    certificateName:
    # -- Will default to {{ include "kubauth.baseName" . }}-ucrd-webhook
    secretName:
    # -- Will default to {{ include "kubauth.webhook.baseName" . }}-ucrd-webhook
    certificateSelfSignedIssuerName:
    # -- Will default to {{ include "kubauth.webhook.baseName" . }}-ucrd-validating-webhook-configuration
    validatingWebhookConfiguration:
    # -- Will default to {{ include "kubauth.webhook.baseName" . }}-ucrd-mutating-webhook-configuration
    mutatingWebhookConfiguration:

  # Default to {{ include "kubauth.baseName" .}}-ucrd
  ingressName:
  # Default to {{ include "kubauth.baseName" .}}-ucrd-ingress
  ingressNetworkPolicyName:

  adminRoleName:
  systemRoleName:

