{{- range .Values.clusterRoleBindings }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ required "ClusterRoleBinding.name is required" .name }}
  labels:
    {{- include "kubauth.labels" $ | nindent 4 }}
  {{- with $.Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
subjects:
  {{- range .users }}
  - kind: User
    name: {{ . }}
    apiGroup: rbac.authorization.k8s.io
  {{- end }}
  {{- range .groups }}
  - kind: Group
    name: {{ . }}
    apiGroup: rbac.authorization.k8s.io
  {{- end }}
roleRef:
  {{- if .role }}
  name: {{ .role }}
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  {{- end }}
  {{- if .clusterRole }}
  name: {{ .clusterRole }}
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  {{ end }}

{{- end }}

