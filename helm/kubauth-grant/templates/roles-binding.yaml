{{- range .Values.roleBindings }}

{{- if and .role .clusterRole }}
{{ fail printf ("One and only one for 'role' and 'clusterRole must be defined (%s  %s)" .role .clusterRole) }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ required "RoleBinding.name is required" .name  }}
  namespace: {{ required "RoleBinding.namespace is required" .namespace }}
  labels:
    {{- include "kubauth.labels" $ | nindent 4 }}
  {{- with $.Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
subjects:
  {{- range .users }}
  - kind: User
    name: {{ . }}
    apiGroup: rbac.authorization.k8s.io
  {{ end }}
  {{- range .groups }}
  - kind: Group
    name: {{ . }}
    apiGroup: rbac.authorization.k8s.io
  {{ end }}
roleRef:
  {{- if .role }}
  name: {{ .role }}
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  {{- end }}
  {{- if .clusterRole }}
  name: {{ .clusterRole }}
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  {{ end }}


{{- end }}

{{- range .Values.clusterRoleBindings }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ required "ClusterRoleBinding.name is required" .name }}
  labels:
    {{- include "kubauth.labels" $ | nindent 4 }}
  {{- with $.Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
subjects:
  {{- range .users }}
  - kind: User
    name: {{ . }}
    apiGroup: rbac.authorization.k8s.io
  {{- end }}
  {{- range .groups }}
  - kind: Group
    name: {{ . }}
    apiGroup: rbac.authorization.k8s.io
  {{- end }}
roleRef:
  {{- if .role }}
  name: {{ .role }}
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  {{- end }}
  {{- if .clusterRole }}
  name: {{ .clusterRole }}
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  {{ end }}

{{- end }}

