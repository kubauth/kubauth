
{{- range .Values.users }}
---
apiVersion: kubauth.kubotal.io/v1alpha1
kind: User
metadata:
  name: {{ .login }}
  namespace: {{ $.Values.namespaces.kubauth.users }}
  labels:
    {{- include "kubauth.labels" $ | nindent 4 }}
  {{- with $.Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .name }}
  name: {{ . }}
  {{- end }}
  {{- with .emails }}
  emails:
    {{- range . }}
    - {{ . }}
    {{- end }}
  {{- end }}
  {{- with .passwordHash }}
  passwordHash: "{{ . }}"
  {{- end }}
  {{- with .uid }}
  uid: {{ . }}
  {{- end }}
  {{- with .comment }}
  comment: {{ . }}
  {{- end }}
  {{- with .disabled }}
  disabled: {{ . }}
  {{- end }}
  {{- with .claims }}
  claims:
    {{- toYaml . | nindent 4 }}
  {{- end }}

{{- end }}

{{- range .Values.groups }}
---
apiVersion: kubauth.kubotal.io/v1alpha1
kind: Group
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespaces.kubauth.users }}
  labels:
    {{- include "kubauth.labels" $ | nindent 4 }}
  {{- with $.Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .comment }}
  comment: {{ . }}
  {{- end }}
  {{- with .claims }}
  claims:
    {{- toYaml . | nindent 4 }}
  {{- end }}

{{- end }}


{{- range .Values.groupBindings }}
---
apiVersion: kubauth.kubotal.io/v1alpha1
kind: GroupBinding
metadata:
  name: {{ (printf "%s-%s" .group .user) | replace ":" "-" }}
  namespace: {{ $.Values.namespaces.kubauth.users }}
  labels:
    {{- include "kubauth.labels" $ | nindent 4 }}
  {{- with $.Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  user: {{ .user }}
  group: {{ .group }}

{{- end }}





